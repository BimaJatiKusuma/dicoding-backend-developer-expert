name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Menggunakan runner yang berjalan di server Ubuntu
    runs-on: self-hosted
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Create .env file
        run: |
          echo "PGHOST=${{ secrets.PGHOST }}" >> .env
          echo "PGUSER=${{ secrets.PGUSER }}" >> .env
          echo "PGPASSWORD=${{ secrets.PGPASSWORD }}" >> .env
          echo "PGDATABASE=${{ secrets.PGDATABASE }}" >> .env
          echo "ACCESS_TOKEN_KEY=${{ secrets.ACCESS_TOKEN_KEY }}" >> .env
          echo "REFRESH_TOKEN_KEY=${{ secrets.REFRESH_TOKEN_KEY }}" >> .env
      
      - name: Install Dependencies & Migrate
        run: |
          npm install
          npm run migrate up
          
      - name: Restart Application
        run: |
          # Jika Anda menjalankan aplikasi langsung dengan PM2 di host:
          npm install -g pm2
          pm2 restart forum-api
          